    <script>
        function nama(){
            document.write("ini dari function nama");

        nama();

        identitas("lucyy", "Tangerang");

        function Tanggal(){
            let tanggal = new Date();
            return tanggal;
        }

        let hasilTanggal = Tanggal();
        document.write(hasilTanggal);
    </script>
</body>
