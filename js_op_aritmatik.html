<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //contoh operator aritmatik
        var a = 10;
        var b = 5;

        var c = a + b; //penjumlahan
        var d = a - b; //pengurangan
        var e = a * b; //perkalian
        var f = a / b; //pembagian
        var g = a % b; //modulus (sisa bagi)

        console.log("Hasil penjumlahan: " + c);
        console.log("Hasil pengurangan: " + d);
        console.log("Hasil perkalian: " + e);
        console.log("Hasil pembagian: " + f);
        console.log("Hasil modulus: " + g);
    </script>
</body>
</html>
