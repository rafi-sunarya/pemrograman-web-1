<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //contoh operator penugasan =, +=, -=, *=, /=
        var a = 10;

        a += 5; //a = a + 5
        console.log("Hasil penugasan += : " + a); //15

        a -= 3; //a = a - 3
        console.log("Hasil penugasan -= : " + a); //12

        a *= 2; //a = a * 2
        console.log("Hasil penugasan *= : " + a); //24

        a /= 4; //a = a / 4
        console.log("Hasil penugasan /= : " + a); //6
    </script>
</body>
</html>
