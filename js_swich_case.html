<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tanggal = new Date();
        document.write(tanggal);
        let hari = new Date().getDay();
        let namaHari;
        switch(hari){
            case 0:
            namaHari = "Minggu";
            break;
            case 1:
            namaHari = "Senin";
            break;
            case 2:
            namaHari = "Selasa";
            break;
            case 3:
            namaHari = "Rabu";
            break;
            case 4:
            namaHari = "Minggu";
            break;
            case 0:
            namaHari = "Minggu";
            break;
            case 0:
            namaHari = "Minggu";
            break;
            
        }
        document.write("<br> Hari ini adalah hari "+namaHari)
    </script>
</body>
</html>
