<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //variabel var let const numerik string double boolean
        var x = 5; //numerik
        var name = "John"; //string
        let y = 10;
        let name2 = "Doe";
        const z = 15; //constanta tidak bisa diubah nilainya
        const phi = 3.14;
        let istrue = true; //boolean
        let full_name = name + " " + name2; //menggabungkan string

        console.log(x);
        console.log(typeof x);
        console.log(name);
        console.log(typeof name);
        console.log(y);
        console.log(typeof y);
        console.log(name2);
        console.log(typeof name2);
        console.log(z);
        console.log(typeof z);
        console.log(phi);
        console.log(typeof phi);
        console.log(istrue);
        console.log(typeof istrue);
        console.log(full_name);
    </script>
</body>
</html>
